apiVersion: apps/v1
kind: Deployment
metadata:
  name: talent-screening-api
  namespace: ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: talent-screening-api
  template:
    metadata:
      labels:
        app: talent-screening-api
    spec:
      containers:
      - name: talent-screening-api
        image: talent-screening-api:1.0
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: talent-screening-api
  namespace: ai
spec:
  selector:
    app: talent-screening-api
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP
